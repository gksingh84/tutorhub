<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <title>Live Quiz</title>
  <style>
    :root,
    html[data-theme="light"] {
      --bg: #f4f6fb;
      --bg-elevated: #fff;
      --surface: #fff;
      --surface2: #f1f5f9;
      --surface3: #e2e8f0;
      --border: rgba(15, 23, 42, 0.08);
      --text: #0f172a;
      --text-muted: #64748b;
      --accent: #4f46e5;
      --accent-hover: #6366f1;
      --accent-soft: rgba(79, 70, 229, 0.12);
      --accent2: #22c55e;
      --accent2-hover: #16a34a;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #b45309;
      --radius: 14px;
      --radius-sm: 10px;
      --font-sans: "DM Sans", "Segoe UI", system-ui, -apple-system, sans-serif;
      --shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
      --shadow-sm: 0 1px 8px rgba(15, 23, 42, 0.06);
    }
    html[data-theme="dark"] {
      --bg: #0c0f14;
      --bg-elevated: #121826;
      --surface: #161d2c;
      --surface2: #1e2738;
      --surface3: #252f44;
      --border: rgba(255, 255, 255, 0.08);
      --text: #eef2f7;
      --text-muted: #94a3b8;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --accent-soft: rgba(99, 102, 241, 0.15);
      --accent2: #34d399;
      --accent2-hover: #10b981;
      --success: #34d399;
      --danger: #f87171;
      --warning: #fbbf24;
      --radius: 14px;
      --radius-sm: 10px;
      --font-sans: "DM Sans", "Segoe UI", system-ui, -apple-system, sans-serif;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.2);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: var(--font-sans);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      transition: background 0.25s ease, color 0.2s ease;
      -webkit-tap-highlight-color: rgba(99, 102, 241, 0.2);
      overscroll-behavior-y: contain;
    }

    /* Scrollbar styling (similar feel to QuizWizard pages) */
    body, .kid-list, .answers-grid, .scoreboard {
      scrollbar-width: thin;
      scrollbar-color: rgba(37, 99, 235, 0.45) rgba(20, 32, 51, 0.08);
    }
    body::-webkit-scrollbar,
    .kid-list::-webkit-scrollbar,
    .answers-grid::-webkit-scrollbar,
    .scoreboard::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    body::-webkit-scrollbar-track,
    .kid-list::-webkit-scrollbar-track,
    .answers-grid::-webkit-scrollbar-track,
    .scoreboard::-webkit-scrollbar-track {
      background: rgba(20, 32, 51, 0.08);
      border-radius: 999px;
    }
    body::-webkit-scrollbar-thumb,
    .kid-list::-webkit-scrollbar-thumb,
    .answers-grid::-webkit-scrollbar-thumb,
    .scoreboard::-webkit-scrollbar-thumb {
      background: rgba(37, 99, 235, 0.45);
      border-radius: 999px;
      border: 2px solid rgba(246, 251, 255, 0.6);
    }
    body::-webkit-scrollbar-thumb:hover,
    .kid-list::-webkit-scrollbar-thumb:hover,
    .answers-grid::-webkit-scrollbar-thumb:hover,
    .scoreboard::-webkit-scrollbar-thumb:hover {
      background: rgba(29, 78, 216, 0.6);
    }
    .wrapper {
      max-width: 1100px;
      margin: 0 auto;
      padding: clamp(1rem, 2.5vw, 2rem) max(clamp(0.85rem, 2.5vw, 1.5rem), env(safe-area-inset-right)) calc(clamp(1rem, 2.5vw, 2rem) + env(safe-area-inset-bottom)) max(clamp(0.85rem, 2.5vw, 1.5rem), env(safe-area-inset-left));
    }
    .header { text-align: center; margin-bottom: 1.5rem; }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.75rem 1rem;
      border-radius: 16px;
      background: var(--surface);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    .brand img {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      background: #fff;
      border: 1px solid var(--border);
      object-fit: contain;
      padding: 6px;
    }
    .brand h1 { font-size: 1.65rem; font-weight: 900; margin: 0; letter-spacing: -0.02em; }
    .brand .sub { margin: 0.05rem 0 0 0; color: var(--text-muted); font-weight: 600; font-size: 0.95rem; }
    .tagline { color: var(--text-muted); font-size: 0.95rem; margin: 0; }

    .controls { background: var(--surface); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.25rem; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

    .control-row { margin-bottom: 1rem; }
    .control-row label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.35rem; }
    .control-row select,
    .control-row input[type="password"],
    .control-row input[type="text"],
    .control-row textarea {
      width: 100%;
      padding: 0.6rem 0.75rem;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .control-row textarea { min-height: 120px; resize: vertical; }
    #sub-topics,
    #additional-details { min-height: 68px; }
    .control-row input[type="password"]::placeholder,
    .control-row input[type="text"]::placeholder,
    .control-row textarea::placeholder { color: var(--text-muted); opacity: 0.8; }
    .control-row select:hover, .control-row select:focus,
    .control-row input:focus, .control-row textarea:focus { border-color: var(--accent); outline: none; }

    .control-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem; margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    .btn { padding: 0.65rem 1.25rem; font-size: 1rem; font-family: inherit; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-fun { background: var(--accent2); color: #042a2f; }
    .btn-fun:hover:not(:disabled) { background: var(--accent2-hover); color: #ffffff; }
    .btn-secondary { background: #ffffff; color: var(--text); border: 1px solid rgba(20, 32, 51, 0.12); }
    .btn-secondary:hover:not(:disabled) { background: rgba(37, 99, 235, 0.06); border-color: rgba(37, 99, 235, 0.35); }
    html[data-theme="dark"] .btn-secondary { background: rgba(30, 39, 56, 0.9); border-color: rgba(255,255,255,0.10); }
    html[data-theme="dark"] .btn-secondary:hover:not(:disabled) { background: rgba(99, 102, 241, 0.12); border-color: rgba(99, 102, 241, 0.35); }
    .btn-danger { background: rgba(220,38,38,0.08); border: 1px solid rgba(220,38,38,0.25); color: #991b1b; }
    .btn-danger:hover:not(:disabled) { background: rgba(220,38,38,0.12); }
    .btn-small { padding: 0.4rem 0.75rem; font-size: 0.85rem; }

    .status { min-height: 1.5rem; margin-top: 0.5rem; font-size: 0.95rem; }
    .status.loading { color: var(--accent); }
    .status.error { color: var(--danger); }
    .status.success { color: var(--success); }
    .status.warn { color: var(--warning); }

    .panel { background: var(--surface); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
    .panel h2 { margin: 0 0 0.75rem 0; font-size: 1.25rem; }
    .hidden { display: none !important; }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .quiz-topbar { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; justify-content: space-between; margin-bottom: 1rem; padding: 0.75rem 1rem; background: rgba(255,255,255,0.75); border-radius: var(--radius); border: 1px solid rgba(20, 32, 51, 0.08); box-shadow: 0 6px 18px rgba(20,32,51,0.06); }
    html[data-theme="dark"] .quiz-topbar { background: rgba(22, 29, 44, 0.72); border-color: rgba(255,255,255,0.10); box-shadow: var(--shadow); }
    .pill { display: inline-flex; gap: 0.5rem; align-items: center; font-size: 0.9rem; color: var(--text-muted); }
    .pill strong { color: var(--text); font-variant-numeric: tabular-nums; }
    .quiz-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    .q-card { background: rgba(255,255,255,0.82); border-radius: calc(var(--radius) + 4px); padding: 1.25rem; border: 1px solid rgba(20, 32, 51, 0.08); box-shadow: 0 12px 28px rgba(20,32,51,0.06); }
    html[data-theme="dark"] .q-card { background: rgba(22, 29, 44, 0.78); border-color: rgba(255,255,255,0.10); box-shadow: var(--shadow); }
    .q-title { margin: 0 0 0.75rem 0; font-size: 1.15rem; line-height: 1.4; }
    .options { display: grid; gap: 0.5rem; margin: 0 0 1rem 0; padding: 0; list-style: none; }
    .opt { padding: 0.6rem 0.75rem; background: rgba(37, 99, 235, 0.06); border: 1px solid rgba(34, 197, 94, 0.18); border-radius: 12px; }
    .opt strong { color: var(--text-muted); margin-right: 0.35rem; }

    .answers-grid { overflow: auto; border-radius: var(--radius); border: 1px solid rgba(20, 32, 51, 0.10); background: rgba(255,255,255,0.65); }
    html[data-theme="dark"] .answers-grid { border-color: rgba(255,255,255,0.10); background: rgba(22, 29, 44, 0.62); }
    table { border-collapse: collapse; width: 100%; min-width: 560px; background: transparent; }
    th, td { padding: 0.65rem 0.65rem; border-bottom: 1px solid rgba(20, 32, 51, 0.08); text-align: left; }
    th { position: sticky; top: 0; background: #eef4ff; z-index: 1; font-size: 0.85rem; color: var(--text-muted); }
    html[data-theme="dark"] th { background: rgba(30, 39, 56, 0.95); }
    .kid-name { font-weight: 700; }
    .radio-row { display: inline-flex; gap: 0.75rem; align-items: center; }
    .radio-row label { display: inline-flex; gap: 0.4rem; align-items: center; cursor: pointer; user-select: none; }
    .radio-row input { width: 1.05em; height: 1.05em; accent-color: var(--accent); }
    .muted { color: var(--text-muted); }

    .scoreboard { overflow: auto; border-radius: var(--radius); border: 1px solid rgba(20, 32, 51, 0.10); background: rgba(255,255,255,0.75); }
    html[data-theme="dark"] .scoreboard { border-color: rgba(255,255,255,0.10); background: rgba(22, 29, 44, 0.70); }
    .rank { font-variant-numeric: tabular-nums; color: var(--text-muted); }
    .good { color: var(--success); font-weight: 700; }
    .bad { color: var(--danger); font-weight: 700; }

    .kid-roster {
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(20, 32, 51, 0.10);
      border-radius: 14px;
      padding: 1rem;
      box-shadow: 0 10px 24px rgba(20,32,51,0.06);
    }
    html[data-theme="dark"] .kid-roster {
      background: rgba(22, 29, 44, 0.78);
      border-color: rgba(255,255,255,0.10);
      box-shadow: var(--shadow);
    }
    .kid-roster h3 { margin: 0 0 0.75rem 0; font-size: 1.05rem; }
    .kid-add { display: flex; gap: 0.5rem; align-items: center; }
    .kid-add input {
      flex: 1 1 auto;
      min-height: 2.1rem; /* ~30% shorter than 3rem */
      padding: 0.6rem 0.75rem; /* ~30% less vertical padding than 0.85rem */
      font-size: 1rem;
      line-height: 1.2;
    }
    .kid-actions { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.75rem; }
    .kid-list { margin-top: 0.75rem; display: grid; gap: 0.5rem; max-height: 320px; overflow: auto; padding-right: 0.25rem; }
    .kid-item {
      display: flex;
      gap: 0.6rem;
      align-items: center;
      justify-content: space-between;
      padding: 0.55rem 0.65rem;
      border-radius: 12px;
      background: rgba(37, 99, 235, 0.05);
      border: 1px solid rgba(37, 99, 235, 0.14);
    }
    html[data-theme="dark"] .kid-item {
      background: rgba(99, 102, 241, 0.10);
      border-color: rgba(99, 102, 241, 0.22);
    }
    .kid-item label { display: inline-flex; gap: 0.55rem; align-items: center; cursor: pointer; user-select: none; font-weight: 700; }
    .kid-item input[type="checkbox"] { width: 1.1em; height: 1.1em; accent-color: var(--accent2); }
    .kid-delete { border: 1px solid rgba(220,38,38,0.25); background: rgba(220,38,38,0.06); color: #991b1b; }
    .kid-delete:hover:not(:disabled) { background: rgba(220,38,38,0.10); }
    html[data-theme="dark"] .kid-delete {
      border-color: rgba(248, 113, 113, 0.35);
      background: rgba(248, 113, 113, 0.10);
      color: #fecaca;
    }
    html[data-theme="dark"] .kid-delete:hover:not(:disabled) { background: rgba(248, 113, 113, 0.16); }

    @media (pointer: coarse) {
      .btn,
      .radio-row label,
      .kid-item label {
        min-height: 44px;
      }
      .control-row select,
      .control-row input[type="password"],
      .control-row input[type="text"],
      .control-row textarea {
        font-size: 16px;
      }
    }

    @media (max-width: 1180px) {
      .wrapper { max-width: none; }
      .panel,
      .controls,
      .q-card,
      .kid-roster { padding: 1.15rem; }
      .quiz-topbar { align-items: stretch; }
      .quiz-actions { width: 100%; }
      .quiz-actions .btn { flex: 1 1 11rem; }
      .kid-list { max-height: 42vh; }
    }

    @media (max-width: 760px) {
      .brand {
        width: 100%;
        justify-content: center;
        text-align: left;
      }
      .brand img { width: 52px; height: 52px; }
      .kid-add { flex-direction: column; align-items: stretch; }
      .kid-actions .btn,
      .control-actions .btn,
      .quiz-actions .btn { width: 100%; }
      table { min-width: 520px; }
    }

    .capture-root {
      position: absolute;
      left: -100000px;
      top: 0;
      width: 980px;
      background: #ffffff;
      color: #142033;
      padding: 24px;
      border: 1px solid rgba(20, 32, 51, 0.10);
      border-radius: 16px;
      font-family: var(--font-sans);
    }
    .capture-title {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }
    .capture-title img { width: 44px; height: 44px; object-fit: contain; }
    .capture-title h2 { margin: 0; font-size: 22px; letter-spacing: -0.02em; }
    .capture-title p { margin: 2px 0 0 0; color: #5a6b85; font-weight: 700; }
    .capture-body .qbox {
      border: 1px solid rgba(20, 32, 51, 0.10);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      background: #f8fbff;
    }
    .capture-body .qbox h3 { margin: 0 0 8px 0; font-size: 15px; }
    .capture-body .qbox .opts { margin: 0; padding: 0; list-style: none; }
    .capture-body .qbox .opts li { margin: 4px 0; }
    .capture-body .qbox .key { margin-top: 10px; font-weight: 800; }
    .capture-body .qbox .explain { margin-top: 6px; color: #2b3a55; font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrapper">
    <header class="header"></header>

    <section class="controls" id="setup">
      <div class="grid-2">
        <div>
          <div class="kid-roster" aria-label="Kids list" data-i18n-aria-label="kidsList">
            <h3 data-i18n="kidsList">Kids list</h3>
            <div class="kid-add">
              <input type="text" id="kid-name" placeholder="Type kid name (e.g. Aarav)" data-i18n-placeholder="phKidName" />
              <button type="button" id="btn-add-kid" class="btn btn-fun btn-small" data-i18n="add">Add</button>
            </div>
            <div class="kid-actions">
              <button type="button" id="btn-select-all-kids" class="btn btn-secondary btn-small" data-i18n="selectAll">Select all</button>
              <button type="button" id="btn-clear-kids" class="btn btn-secondary btn-small" data-i18n="clearSelection">Clear selection</button>
            </div>
            <div class="status muted" style="margin-top:0.5rem;" data-i18n="kidsHelp">
              Tick the kids who are playing this quiz. You can add more or delete any kid anytime.
            </div>
            <div id="kids-list" class="kid-list" role="list"></div>
          </div>
        </div>

        <div>
          <div class="grid-2" style="gap:0.75rem;">
            <div class="control-row">
              <label for="grade" data-i18n="grade">Grade</label>
              <select id="grade">
                <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                <option value="4" selected>4</option><option value="5">5</option><option value="6">6</option>
                <option value="7">7</option><option value="8">8</option><option value="9">9</option>
              </select>
            </div>
            <div class="control-row">
              <label for="count" data-i18n="questions">Questions</label>
              <select id="count">
                <option value="5">5</option>
                <option value="10" selected>10</option>
                <option value="15">15</option>
                <option value="20">20</option>
                <option value="25">25</option>
                <option value="30">30</option>
              </select>
            </div>
          </div>

          <div class="grid-2" style="gap:0.75rem;">
            <div class="control-row">
              <label for="subject" data-i18n="subject">Subject</label>
              <select id="subject">
                <option value="Mathematics" selected>Mathematics</option>
                <option value="Science">Science</option>
                <option value="English">English</option>
                <option value="Hindi">Hindi</option>
                <option value="Social Studies">Social Studies</option>
                <option value="General Knowledge">General Knowledge</option>
                <option value="Others">Others</option>
              </select>
            </div>
            <div class="control-row">
              <label for="board" data-i18n="board">Board</label>
              <select id="board">
                <option value="CBSE" selected>CBSE</option>
                <option value="ICSE">ICSE</option>
                <option value="Olympiad">Olympiad</option>
                <option value="General">General</option>
              </select>
            </div>
          </div>
          <div class="control-row">
            <label for="difficulty" data-i18n="difficulty">Difficulty</label>
            <select id="difficulty">
              <option value="Easy" selected>Easy</option>
              <option value="Medium">Medium</option>
              <option value="Olympiad">Olympiad</option>
            </select>
          </div>

          <div class="control-row">
            <label for="topic-suggest" data-i18n="topic">Topic</label>
            <select id="topic-suggest"></select>
          </div>
          <div id="topic-custom-wrap" class="hidden control-row">
            <label for="custom-topic" data-i18n="customTopic">Custom topic</label>
            <input type="text" id="custom-topic" placeholder="Describe your topic (used when Topic is Others)" data-i18n-placeholder="phCustomTopic" />
          </div>
          <select id="topic" class="visually-hidden" tabindex="-1" aria-hidden="true"></select>

          <div class="control-row">
            <label for="sub-topics" data-i18n="subTopic">Sub topic (optional)</label>
            <textarea id="sub-topics" rows="3" placeholder="Comma-separated ideas, e.g. word problems, diagrams, mental math" data-i18n-placeholder="phSubTopic"></textarea>
          </div>

          <div class="control-row">
            <label for="additional-details" data-i18n="details">Additional details (optional)</label>
            <textarea id="additional-details" rows="3" placeholder="e.g. avoid negatives, use Indian currency examples, keep language simple" data-i18n-placeholder="phDetails"></textarea>
          </div>
        </div>
      </div>

      <div class="control-actions">
        <button type="button" id="btn-start" class="btn btn-primary" data-i18n="start">Start Live Quiz</button>
        <button type="button" id="btn-reset" class="btn btn-secondary" data-i18n="reset">Reset</button>
        <button type="button" id="btn-load-sample" class="btn btn-secondary" data-i18n="sample">Load sample quiz</button>
        <span class="status" id="setup-status"></span>
      </div>
    </section>

    <section class="panel hidden" id="quiz">
      <div class="quiz-topbar">
        <div class="pill"><span data-i18n="question">Question</span> <strong id="q-index">1</strong> / <strong id="q-total">0</strong></div>
        <div class="quiz-actions">
          <button type="button" id="btn-prev" class="btn btn-secondary btn-small" data-i18n="previous">Previous</button>
          <button type="button" id="btn-next" class="btn btn-primary btn-small" data-i18n="next">Next</button>
          <button type="button" id="btn-show-answer" class="btn btn-fun btn-small" data-i18n="showAnswer">Show answer</button>
          <button type="button" id="btn-finish" class="btn btn-secondary btn-small" data-i18n="finish">Finish</button>
          <button type="button" id="btn-exit" class="btn btn-danger btn-small" data-i18n="exitQuiz">Exit quiz</button>
        </div>
      </div>

      <div class="panel hidden" id="answer-panel" style="margin-bottom:1rem;">
        <h2 style="margin:0 0 0.5rem 0; font-size:1.15rem;" data-i18n="answerExplain">Answer & explanation</h2>
        <div class="status" id="answer-text" style="margin-top:0;"></div>

        var topics = getTopicSuggestionsForContext(board, grade, subject);
        var prevPick = els.topicSuggest.value;
        var prevCustom = els.customTopic ? (els.customTopic.value || '').trim() : '';

        function listHas(val) {
          return val && topics.some(function (x) {
            return String(x) === val || String(x).toLowerCase() === String(val).toLowerCase();
          });
        }

        els.topic.innerHTML = '';
        topics.forEach(function (t) {
          var opt = document.createElement('option');
          opt.value = t;
          opt.textContent = t;
          els.topic.appendChild(opt);
        });
        var oHiddenOthers = document.createElement('option');
        oHiddenOthers.value = TOPIC_OTHERS;
        oHiddenOthers.textContent = 'Others';
        els.topic.appendChild(oHiddenOthers);

        els.topicSuggest.innerHTML = '';
        topics.forEach(function (t) {
          var o = document.createElement('option');
          o.value = t;
          o.textContent = t;
          els.topicSuggest.appendChild(o);
        });
        var oOthers = document.createElement('option');
        oOthers.value = TOPIC_OTHERS;
        oOthers.textContent = 'Others';
        els.topicSuggest.appendChild(oOthers);

        if (prevPick === TOPIC_OTHERS || (prevCustom && !listHas(prevPick))) {
          els.topicSuggest.value = TOPIC_OTHERS;
          els.topic.value = TOPIC_OTHERS;
          if (els.customTopic && prevCustom) els.customTopic.value = prevCustom;
        } else if (prevPick && listHas(prevPick)) {
          var match = topics.find(function (x) { return String(x) === prevPick || String(x).toLowerCase() === String(prevPick).toLowerCase(); });
          els.topicSuggest.value = match != null ? match : topics[0];
          els.topic.value = els.topicSuggest.value;
        } else if (topics.length > 0) {
          els.topicSuggest.value = topics[0];
          els.topic.value = topics[0];
        } else {
          els.topicSuggest.value = TOPIC_OTHERS;
          els.topic.value = TOPIC_OTHERS;
        }
        syncTopicCustomWrap();
      }

      function getFinalTopic() {
        if (!els.topicSuggest) return '';
        if (els.topicSuggest.value === TOPIC_OTHERS) {
          return els.customTopic ? (els.customTopic.value || '').trim() : '';
        }
        return (els.topicSuggest.value || '').trim();
      }

      function setStatus(el, msg, type) {
        el.textContent = msg || '';
        el.className = 'status ' + (type || '');
      }

      function escapeHtml(s) {
        var div = document.createElement('div');
        div.textContent = s == null ? '' : String(s);
        return div.innerHTML;
      }

      function normalizeAnswerLetter(a) {
        var x = (a || '').toString().trim().toUpperCase();
        if (x === 'A' || x === 'B' || x === 'C' || x === 'D') return x;
        return null;
      }

      function normalizeKidName(name) {
        var s = (name || '').toString().trim().replace(/\s+/g, ' ');
        return s;
      }

      function rosterKeyOf(name) {
        return normalizeKidName(name).toLowerCase();
      }

      function loadRoster() {
        try {
          var raw = localStorage.getItem(ROSTER_KEY);
          if (!raw) return [];
          var list = JSON.parse(raw);
          if (!Array.isArray(list)) return [];
          return list.map(function (x) { return normalizeKidName(x); }).filter(Boolean);
        } catch (e) {
          return [];
        }
      }

      function saveRoster(names) {
        try { localStorage.setItem(ROSTER_KEY, JSON.stringify(names)); } catch (e) {}
      }

      var rosterState = {
        names: [],
        selected: Object.create(null) // key -> true
      };

      function renderRoster() {
        if (!els.kidsList) return;
        if (rosterState.names.length === 0) {
          els.kidsList.innerHTML = '<div class="status muted">No kids yet. Add some names above.</div>';
          return;
        }
        var html = rosterState.names.map(function (name) {
          var key = rosterKeyOf(name);
          var checked = rosterState.selected[key] ? ' checked' : '';
          var id = 'kid-sel-' + key.replace(/[^a-z0-9]+/g, '-');
          return '' +
            '<div class="kid-item" role="listitem">' +
              '<label for="' + id + '">' +
                '<input type="checkbox" id="' + id + '" data-kid="' + escapeHtml(key) + '"' + checked + ' />' +
                '<span>' + escapeHtml(name) + '</span>' +
              '</label>' +
              '<button type="button" class="btn btn-small kid-delete" data-delete="' + escapeHtml(key) + '">Delete</button>' +
            '</div>';
        }).join('');
        els.kidsList.innerHTML = html;

        els.kidsList.querySelectorAll('input[type="checkbox"][data-kid]').forEach(function (cb) {
          cb.addEventListener('change', function () {
            var key = cb.getAttribute('data-kid');
            if (!key) return;
            rosterState.selected[key] = cb.checked ? true : false;
          });
        });

        els.kidsList.querySelectorAll('button[data-delete]').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var key = btn.getAttribute('data-delete');
            if (!key) return;
            var nameToDelete = null;
            rosterState.names.forEach(function (n) { if (rosterKeyOf(n) === key) nameToDelete = n; });
            if (!nameToDelete) return;
            if (!confirm('Do you really want to delete "' + nameToDelete + '" from kids list?')) return;
            rosterState.names = rosterState.names.filter(function (n) { return rosterKeyOf(n) !== key; });
            delete rosterState.selected[key];
            saveRoster(rosterState.names);
            renderRoster();
          });
        });
      }

      function addKidFromInput() {
        var name = normalizeKidName(els.kidName && els.kidName.value);
        if (!name) { setStatus(els.setupStatus, 'Type a kid name first.', 'error'); return; }
        if (rosterState.names.length >= 80) { setStatus(els.setupStatus, 'Kids list is too long. Please keep it under 80.', 'error'); return; }
        var key = rosterKeyOf(name);
        var exists = rosterState.names.some(function (n) { return rosterKeyOf(n) === key; });
        if (exists) {
          rosterState.selected[key] = true;
          setStatus(els.setupStatus, 'Already added. Selected "' + name + '".', 'success');
          renderRoster();
          els.kidName.value = '';
          els.kidName.focus();
          return;
        }
        rosterState.names.push(name);
        rosterState.names.sort(function (a, b) { return a.localeCompare(b); });
        rosterState.selected[key] = true;
        saveRoster(rosterState.names);
        renderRoster();
        els.kidName.value = '';
        els.kidName.focus();
        setStatus(els.setupStatus, 'Added "' + name + '".', 'success');
      }

      function getSelectedKids() {
        var out = [];
        rosterState.names.forEach(function (name) {
          var key = rosterKeyOf(name);
          if (rosterState.selected[key]) out.push(name);
        });
        return out;
      }

      function parseQuestionsFromJson(text) {
        var raw = (text || '').trim();
        if (!raw) return null;
        raw = raw.replace(/^```json\s*/i, '').replace(/\s*```\s*$/i, '').trim();
        var list = JSON.parse(raw);
        if (!Array.isArray(list)) throw new Error('Questions JSON must be an array.');
        var cleaned = list.map(function (q, idx) {
          var options = Array.isArray(q.options) ? q.options.slice(0, 4) : [];
          if (options.length !== 4) throw new Error('Question ' + (idx + 1) + ' must have exactly 4 options.');
          var ans = normalizeAnswerLetter(q.answer);
          if (!ans) throw new Error('Question ' + (idx + 1) + ' must have answer "A" / "B" / "C" / "D".');
          return {
            question: (q.question || '').toString(),
            options: options.map(function (x) { return (x == null ? '' : String(x)); }),
            answer: ans,
            explanation: q.explanation != null ? String(q.explanation) : ''
          };
        });
        if (cleaned.length === 0) throw new Error('Questions array is empty.');
        return cleaned;
      }

      function buildPrompt(grade, subject, topic, difficulty, count, subtopics, additionalDetails) {
        var st = (subtopics || '').toString().trim();
        var ad = (additionalDetails || '').toString().trim();
        var extra = '';
        if (st) extra += 'Sub topic focus (optional): ' + st + '\n';
        if (ad) extra += 'Additional details (optional): ' + ad + '\n';
        return 'Generate exactly ' + count + ' ' + difficulty + ' level MCQ questions for kids (Grade ' + grade + ').\n' +
          'Subject: ' + subject + '\n' +
          'Topic: ' + topic + '\n' +
          (extra ? '\n' + extra + '\n' : '\n') +
          'Rules:\n' +
          '- Exactly 4 options per question.\n' +
          '- One correct answer.\n' +
          '- Include a short "explanation" for the correct answer.\n' +
          '- Return ONLY a single JSON array (no markdown, no extra text).\n' +
          '- Schema: [{"question":"...","options":["...","...","...","..."],"answer":"A|B|C|D","explanation":"..."}]\n';
      }

      function getProvider() {
        return ai.provider === 'openai' ? 'openai' : 'gemini';
      }

      async function generateQuestionsWithGemini() {
        var key = (ai.googleApiKey || '').trim();
        if (!key) throw new Error('Add your Google Gemini API key in Tutor Hub → Settings, then click Save settings.');
        var model = ai.geminiModel ? String(ai.geminiModel) : 'gemini-3-flash-preview';
        if (model === '__custom__' && (ai.geminiCustomModelId || '').trim()) model = (ai.geminiCustomModelId || '').trim();
        if (!model || model === '__custom__') model = 'gemini-3-flash-preview';

        var grade = els.grade.value;
        var subject = els.subject.value;
        var topic = getFinalTopic() || 'General';
        var subtopics = els.subTopics ? (els.subTopics.value || '').trim() : '';
        var additionalDetails = els.additionalDetails ? (els.additionalDetails.value || '').trim() : '';
        var difficulty = els.difficulty.value;
        var count = parseInt(els.count.value, 10);

        var prompt = buildPrompt(grade, subject, topic, difficulty, count, subtopics, additionalDetails);
        var url = GEMINI_BASE + model + ':generateContent?key=' + encodeURIComponent(key);

        var res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { temperature: 0.6 }
          })
        });
        var data = await res.json();
        if (!res.ok) {
          var msg = data && data.error && data.error.message ? data.error.message : (res.statusText || 'Request failed');
          throw new Error(msg);
        }
        var raw = (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0])
          ? data.candidates[0].content.parts[0].text
          : '[]';
        raw = (raw || '').trim().replace(/^```json\s*/i, '').replace(/\s*```\s*$/i, '').trim();
        return parseQuestionsFromJson(raw);
      }

      async function generateQuestionsWithOpenAI() {
        var key = (ai.openaiApiKey || '').trim();
        if (!key) throw new Error('Add your OpenAI API key in Tutor Hub → Settings, then click Save settings.');
        var model = (ai.openaiModel || '').trim() || 'gpt-4.1-mini';

        var grade = els.grade.value;
        var subject = els.subject.value;
        var topic = getFinalTopic() || 'General';
        var subtopics = els.subTopics ? (els.subTopics.value || '').trim() : '';
        var additionalDetails = els.additionalDetails ? (els.additionalDetails.value || '').trim() : '';
        var difficulty = els.difficulty.value;
        var count = parseInt(els.count.value, 10);

        var prompt = 'You are a worksheet question writer for kids. Respond with valid JSON only, no markdown code fences.\n\n' +
          buildPrompt(grade, subject, topic, difficulty, count, subtopics, additionalDetails);

        var res = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + key
          },
          body: JSON.stringify({
            model: model,
            messages: [
              { role: 'system', content: 'You create multiple choice questions for kids.' },
              { role: 'user', content: prompt }
            ],
            temperature: 0.6
          })
        });
        var data = await res.json();
        if (!res.ok) {
          var msg = data && data.error && data.error.message ? data.error.message : (res.statusText || 'Request failed');
          throw new Error(msg);
        }
        var raw = data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content
          ? data.choices[0].message.content
          : '[]';
        raw = (raw || '').trim().replace(/^```json\s*/i, '').replace(/\s*```$/i, '').trim();
        return parseQuestionsFromJson(raw);
      }

      async function generateQuestionsWithProvider() {
        var provider = getProvider();
        if (provider === 'openai') return generateQuestionsWithOpenAI();
        return generateQuestionsWithGemini();
      }

      function downloadTextFile(filename, text) {
        var blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(function () { URL.revokeObjectURL(url); }, 5000);
      }

      function csvEscape(s) {
        var x = (s == null ? '' : String(s));
        if (/[",\r\n]/.test(x)) return '"' + x.replace(/"/g, '""') + '"';
        return x;
      }

      var state = {
        kids: [],
        questions: [],
        currentIndex: 0,
        // answers[qIdx][kidIdx] = "A"|"B"|"C"|"D"|null
        answers: [],
        // revealed[qIdx] = true/false
        revealed: [],
        meta: null
      };

      function initAnswers() {
        state.answers = state.questions.map(function () {
          return state.kids.map(function () { return null; });
        });
        state.revealed = state.questions.map(function () { return false; });
      }

      function computeScores() {
        var totals = state.kids.map(function () {
          return { correct: 0, attempted: 0, total: state.questions.length };
        });
        state.questions.forEach(function (q, qi) {
          var correct = normalizeAnswerLetter(q.answer);
          state.kids.forEach(function (_, ki) {
            var a = state.answers[qi][ki];
            if (a != null) totals[ki].attempted += 1;
            if (a != null && correct && a === correct) totals[ki].correct += 1;
          });
        });
        return totals;
      }

      function renderQuestion() {
        var q = state.questions[state.currentIndex];
        if (!q) return;
        var qi = state.currentIndex;

        els.qIndex.textContent = String(qi + 1);
        els.qTotal.textContent = String(state.questions.length);
        els.qText.innerHTML = 'Q' + (qi + 1) + '. ' + escapeHtml(q.question);
        var isRevealed = Boolean(state.revealed[qi]);
        els.btnShowAnswer.textContent = isRevealed ? 'Hide answer' : 'Show answer';
        els.answerPanel.classList.toggle('hidden', !isRevealed);
        if (isRevealed) {
          els.answerText.innerHTML = '<strong>Correct answer:</strong> ' + escapeHtml(q.answer || '—');
          els.answerExpl.textContent = (q.explanation || '').trim() ? ('Explanation: ' + (q.explanation || '').trim()) : 'Explanation: —';
        } else {
          els.answerText.textContent = '';
          els.answerExpl.textContent = '';
        }

        var labels = ['A', 'B', 'C', 'D'];
        els.qOptions.innerHTML = (q.options || []).slice(0, 4).map(function (opt, i) {
          return '<li class="opt"><strong>' + labels[i] + '.</strong> ' + escapeHtml(opt) + '</li>';
        }).join('');

        els.btnPrev.disabled = qi === 0;
        els.btnNext.textContent = (qi === state.questions.length - 1) ? 'Next (finish)' : 'Next';

        renderKidsAnswerTable();
        setStatus(els.quizStatus, '', '');
      }

      function renderKidsAnswerTable() {
        var qi = state.currentIndex;
        var correct = normalizeAnswerLetter(state.questions[qi].answer);
        var isRevealed = Boolean(state.revealed[qi]);
        var labels = ['A', 'B', 'C', 'D'];

        var tbody = '';
        for (var ki = 0; ki < state.kids.length; ki++) {
          var name = state.kids[ki];
          var val = state.answers[qi][ki]; // may be null
          var verdict = '<span class="muted">—</span>';
          if (isRevealed) {
            if (val == null) verdict = '<span class="muted">Blank</span>';
            else verdict = (val === correct ? '<span class="good">Correct</span>' : '<span class="bad">Wrong</span>');
          }

          var radios = labels.map(function (lab) {
            var id = 'q' + qi + '-k' + ki + '-' + lab;
            var checked = val === lab ? ' checked' : '';
            return '<label for="' + id + '"><input type="radio" name="q' + qi + '-k' + ki + '" id="' + id + '" value="' + lab + '"' + checked + ' /> ' + lab + '</label>';
          }).join('');
          var blankId = 'q' + qi + '-k' + ki + '-blank';
          var blankChecked = val == null ? ' checked' : '';
          radios += ' <label for="' + blankId + '"><input type="radio" name="q' + qi + '-k' + ki + '" id="' + blankId + '" value=""' + blankChecked + ' /> blank</label>';

          tbody += '<tr>' +
            '<td class="kid-name">' + escapeHtml(name) + '</td>' +
            '<td><div class="radio-row">' + radios + '</div></td>' +
            '<td>' + verdict + '</td>' +
          '</tr>';
        }
        els.kidsAnswersBody.innerHTML = tbody;

        // Attach listeners
        els.kidsAnswersBody.querySelectorAll('input[type="radio"]').forEach(function (input) {
          input.addEventListener('change', function () {
            var name = input.name; // q{qi}-k{ki}
            var m = /^q(\d+)-k(\d+)$/.exec(name);
            if (!m) return;
            var qIdx = parseInt(m[1], 10);
            var kIdx = parseInt(m[2], 10);
            var v = (input.value || '').trim().toUpperCase();
            state.answers[qIdx][kIdx] = normalizeAnswerLetter(v);
            renderKidsAnswerTable();
          }, { once: false });
        });
      }

      function showPanel(which) {
        els.setup.classList.toggle('hidden', which !== 'setup');
        els.quiz.classList.toggle('hidden', which !== 'quiz');
        els.results.classList.toggle('hidden', which !== 'results');
      }

      function formatDateShort(d) {
        try { return new Intl.DateTimeFormat(undefined, { year: 'numeric', month: 'short', day: '2-digit' }).format(d); }
        catch (e) { return d.toLocaleDateString(); }
      }

      function buildMetaSubtitle() {
        var d = state.meta && state.meta.date ? new Date(state.meta.date) : new Date();
        var topic = (state.meta && state.meta.topic ? String(state.meta.topic).trim() : '') || 'General';
        return formatDateShort(d) + ' · ' + topic + ' · ' + state.questions.length + ' questions';
      }

      function renderResults() {
        var totals = computeScores();
        var rows = totals.map(function (t, idx) {
          var accuracy = t.total ? Math.round((t.correct / t.total) * 100) : 0;
          return { kid: state.kids[idx], correct: t.correct, total: t.total, accuracy: accuracy };
        }).sort(function (a, b) {
          if (b.correct !== a.correct) return b.correct - a.correct;
          return a.kid.localeCompare(b.kid);
        });

        var body = '';
        rows.forEach(function (r, i) {
          body += '<tr>' +
            '<td class="rank">#' + (i + 1) + '</td>' +
            '<td class="kid-name">' + escapeHtml(r.kid) + '</td>' +
            '<td><strong>' + r.correct + '</strong> / ' + r.total + '</td>' +
            '<td>' + r.accuracy + '%</td>' +
          '</tr>';
        });
        els.resultsBody.innerHTML = body;
        els.resultsSubtitle.textContent = buildMetaSubtitle();
      }

      function exportCsv() {
        var totals = computeScores();
        var header = ['Kid', 'Score', 'Total', 'AccuracyPercent'].join(',');
        var lines = [header];
        totals.forEach(function (t, idx) {
          var acc = t.total ? ((t.correct / t.total) * 100) : 0;
          lines.push([csvEscape(state.kids[idx]), t.correct, t.total, Math.round(acc)].join(','));
        });
        downloadTextFile('live-quiz-results.csv', lines.join('\r\n'));
        setStatus(els.resultsStatus, 'CSV exported.', 'success');
      }

      async function exportResultsImage(kind) {
        if (!window.html2canvas) {
          setStatus(els.resultsStatus, 'Image export not available (html2canvas failed to load).', 'error');
          return;
        }
        try {
          setStatus(els.resultsStatus, 'Preparing ' + (kind === 'jpg' ? 'JPG' : 'PNG') + '…', 'loading');
          var node = els.resultsCapture || els.results;
          var canvas = await window.html2canvas(node, {
            backgroundColor: '#ffffff',
            scale: Math.min(2, (window.devicePixelRatio || 1))
          });
          var mime = (kind === 'jpg') ? 'image/jpeg' : 'image/png';
          var dataUrl = canvas.toDataURL(mime, kind === 'jpg' ? 0.92 : undefined);
          var a = document.createElement('a');
          a.href = dataUrl;
          a.download = 'maths-mentor-results.' + (kind === 'jpg' ? 'jpg' : 'png');
          document.body.appendChild(a);
          a.click();
          a.remove();
          setStatus(els.resultsStatus, (kind === 'jpg' ? 'JPG' : 'PNG') + ' exported.', 'success');
        } catch (e) {
          setStatus(els.resultsStatus, 'Export failed: ' + (e && e.message ? e.message : 'Unknown error'), 'error');
        }
      }

      function buildCaptureHeaderText() {
        var topic = (state.meta && state.meta.topic) ? String(state.meta.topic).trim() : 'General';
        var qCount = state.questions ? state.questions.length : 0;
        var d = state.meta && state.meta.date ? new Date(state.meta.date) : new Date();
        var dateStr = formatDateShort(d);
        return { dateStr: dateStr, topic: topic, qCount: qCount };
      }

      function renderCaptureQuiz() {
        if (!els.captureQuiz) return;
        var h = buildCaptureHeaderText();
        var logoHtml = '';
        var body = '<div class="capture-body">';
        (state.questions || []).forEach(function (q, idx) {
          var qi = idx + 1;
          var opts = (q.options || []).slice(0, 4);
          var labels = ['A', 'B', 'C', 'D'];
          var optsHtml = '';
          for (var i = 0; i < opts.length; i++) {
            optsHtml += '<li><strong>' + labels[i] + '.</strong> ' + escapeHtml(opts[i]) + '</li>';
          }
          body += '<div class="qbox">' +
            '<h3>Q' + qi + '. ' + escapeHtml(q.question || '') + '</h3>' +
            '<ul class="opts">' + optsHtml + '</ul>' +
            '</div>';
        });
        body += '</div>';
        els.captureQuiz.innerHTML =
          '<div class="capture-title">' + logoHtml +
          '<div>' +
          '<h2>Live Quiz</h2>' +
          '<p>' + escapeHtml(h.dateStr) + ' · ' + escapeHtml(h.topic) + ' · ' + String(h.qCount) + ' questions</p>' +
          '</div>' +
          '</div>' +
          body;
      }

      function renderCaptureAnswerKey() {
        if (!els.captureKey) return;
        var h = buildCaptureHeaderText();
        var logoHtml = '';
        var body = '<div class="capture-body">';
        (state.questions || []).forEach(function (q, idx) {
          var qi = idx + 1;
          var expl = (q.explanation || '').toString().trim();
          body += '<div class="qbox">' +
            '<h3>Q' + qi + '. ' + escapeHtml(q.question || '') + '</h3>' +
            '<div class="key">Answer: <span style="color:#2563eb;">' + escapeHtml(q.answer || '—') + '</span></div>' +
            (expl ? '<div class="explain"><strong>Explanation:</strong> ' + escapeHtml(expl) + '</div>' : '') +
            '</div>';
        });
        body += '</div>';
        els.captureKey.innerHTML =
          '<div class="capture-title">' + logoHtml +
          '<div>' +
          '<h2>Answer Key</h2>' +
          '<p>' + escapeHtml(h.dateStr) + ' · ' + escapeHtml(h.topic) + ' · ' + String(h.qCount) + ' questions</p>' +
          '</div>' +
          '</div>' +
          body;
      }

      async function exportQuizPng() {
        if (!window.html2canvas) {
          setStatus(els.resultsStatus, 'PNG export not available (html2canvas failed to load).', 'error');
          return;
        }
        try {
          setStatus(els.resultsStatus, 'Preparing Quiz PNG…', 'loading');
          renderCaptureQuiz();
          var node = els.captureQuiz;
          node.classList.remove('hidden');
          var canvas = await window.html2canvas(node, {
            backgroundColor: '#ffffff',
            scale: Math.min(2, (window.devicePixelRatio || 1))
          });
          var dataUrl = canvas.toDataURL('image/png');
          var a = document.createElement('a');
          a.href = dataUrl;
          a.download = 'maths-mentor-quiz.png';
          document.body.appendChild(a);
          a.click();
          a.remove();
          node.classList.add('hidden');
          setStatus(els.resultsStatus, 'Quiz PNG exported.', 'success');
        } catch (e) {
          setStatus(els.resultsStatus, 'Quiz PNG export failed: ' + (e && e.message ? e.message : 'Unknown error'), 'error');
        }
      }

      async function exportAnswerKeyPng() {
        if (!window.html2canvas) {
          setStatus(els.resultsStatus, 'PNG export not available (html2canvas failed to load).', 'error');
          return;
        }
        try {
          setStatus(els.resultsStatus, 'Preparing Answer Key PNG…', 'loading');
          renderCaptureAnswerKey();
          var node = els.captureKey;
          node.classList.remove('hidden');
          var canvas = await window.html2canvas(node, {
            backgroundColor: '#ffffff',
            scale: Math.min(2, (window.devicePixelRatio || 1))
          });
          var dataUrl = canvas.toDataURL('image/png');
          var a = document.createElement('a');
          a.href = dataUrl;
          a.download = 'maths-mentor-answer-key.png';
          document.body.appendChild(a);
          a.click();
          a.remove();
          node.classList.add('hidden');
          setStatus(els.resultsStatus, 'Answer Key PNG exported.', 'success');
        } catch (e) {
          setStatus(els.resultsStatus, 'Answer Key PNG export failed: ' + (e && e.message ? e.message : 'Unknown error'), 'error');
        }
      }

      function exportQuizPdf() {
        var JsPDF = window.jspdf && window.jspdf.jsPDF ? window.jspdf.jsPDF : null;
        if (!JsPDF) {
          setStatus(els.resultsStatus, 'PDF export not available (jsPDF failed to load).', 'error');
          return;
        }
        if (!state.questions || state.questions.length === 0) return;
        try {
          setStatus(els.resultsStatus, 'Preparing Quiz PDF…', 'loading');
          var doc = new JsPDF({ orientation: 'portrait', unit: 'pt', format: 'a4' });
          var h = buildCaptureHeaderText();
          var margin = 40;
          var y = 60;

          doc.setFontSize(18);
          doc.text('Live Quiz', margin, y);
          y += 22;
          doc.setFontSize(10);
          doc.text(h.dateStr + ' · ' + h.topic + ' · ' + String(h.qCount) + ' questions', margin, y);
          y += 20;

          var pageW = doc.internal.pageSize.getWidth();
          var maxW = pageW - 2 * margin;
          doc.setFontSize(12);
          var labels = ['A', 'B', 'C', 'D'];

          (state.questions || []).forEach(function (q, idx) {
            var qi = idx + 1;
            var qTitle = 'Q' + qi + '. ' + (q.question || '');
            var lines = doc.splitTextToSize(qTitle, maxW);
            if (y + lines.length * 14 > 760) { doc.addPage(); y = 60; }
            doc.setFontSize(12);
            doc.text(lines, margin, y);
            y += lines.length * 14;

            var opts = (q.options || []).slice(0, 4);
            for (var i = 0; i < opts.length; i++) {
              var optLine = labels[i] + '. ' + opts[i];
              var optLines = doc.splitTextToSize(optLine, maxW);
              if (y + optLines.length * 12 > 780) { doc.addPage(); y = 60; }
              doc.setFontSize(11);
              doc.text(optLines, margin + 18, y);
              y += optLines.length * 12;
            }
            y += 10;
          });

          doc.save('maths-mentor-quiz.pdf');
          setStatus(els.resultsStatus, 'Quiz PDF exported.', 'success');
        } catch (e) {
          setStatus(els.resultsStatus, 'Quiz PDF export failed: ' + (e && e.message ? e.message : 'Unknown error'), 'error');
        }
      }

      function exportAnswerKeyPdf() {
        var JsPDF = window.jspdf && window.jspdf.jsPDF ? window.jspdf.jsPDF : null;
        if (!JsPDF) {
          setStatus(els.resultsStatus, 'PDF export not available (jsPDF failed to load).', 'error');
          return;
        }
        if (!state.questions || state.questions.length === 0) return;
        try {
          setStatus(els.resultsStatus, 'Preparing Answer Key PDF…', 'loading');
          var doc = new JsPDF({ orientation: 'portrait', unit: 'pt', format: 'a4' });
          var h = buildCaptureHeaderText();
          var margin = 40;
          var y = 60;

          doc.setFontSize(18);
          doc.text('Answer Key', margin, y);
          y += 22;
          doc.setFontSize(10);
          doc.text(h.dateStr + ' · ' + h.topic + ' · ' + String(h.qCount) + ' questions', margin, y);
          y += 20;

          var pageW = doc.internal.pageSize.getWidth();
          var maxW = pageW - 2 * margin;

          (state.questions || []).forEach(function (q, idx) {
            var qi = idx + 1;
            var qTitle = 'Q' + qi + '. ' + (q.question || '');
            var lines = doc.splitTextToSize(qTitle, maxW);
            if (y + lines.length * 14 > 740) { doc.addPage(); y = 60; }
            doc.setFontSize(12);
            doc.text(lines, margin, y);
            y += lines.length * 14;

            var ansLine = 'Answer: ' + (q.answer || '—');
            var ansLines = doc.splitTextToSize(ansLine, maxW);
            doc.setFontSize(12);
            if (y + ansLines.length * 14 > 780) { doc.addPage(); y = 60; }
            doc.text(ansLines, margin, y);
            y += ansLines.length * 14;

            var expl = (q.explanation || '').toString().trim();
            if (expl) {
              var explLines = doc.splitTextToSize('Explanation: ' + expl, maxW);
              doc.setFontSize(10);
              if (y + explLines.length * 12 > 780) { doc.addPage(); y = 60; }
              doc.text(explLines, margin, y);
              y += explLines.length * 12;
            }

            y += 10;
          });

          doc.save('maths-mentor-answer-key.pdf');
          setStatus(els.resultsStatus, 'Answer Key PDF exported.', 'success');
        } catch (e) {
          setStatus(els.resultsStatus, 'Answer Key PDF export failed: ' + (e && e.message ? e.message : 'Unknown error'), 'error');
        }
      }

      function buildArchiveItem(source) {
        if (!state.questions || !state.questions.length) return null;
        var meta = state.meta || {};
        var savedAt = new Date().toISOString();
        var label = 'Live Quiz · ' +
          (meta.subject || 'General') +
          (meta.grade != null ? ' · Gr ' + meta.grade : '') +
          ' · ' +
          ((meta.topic || '').toString().trim() || 'General') +
          ' — ' +
          state.questions.length +
          ' qs · ' +
          new Date().toLocaleString();
        return {
          type: 'livequiz',
          source: source || 'manual',
          savedAt: savedAt,
          label: label,
          meta: meta,
          questions: state.questions.slice(),
          kids: state.kids.slice(),
          answers: state.answers,
          revealed: state.revealed
        };
      }

      function saveLiveQuizToArchive(source) {
        var item = buildArchiveItem(source || 'manual');
        if (!item) {
          setStatus(els.resultsStatus || els.setupStatus, 'Nothing to archive yet. Start a live quiz first.', 'error');
          return;
        }
        try {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'LQ_SAVE_ARCHIVE', item: item }, '*');
          }
          if (source !== 'auto') setStatus(els.resultsStatus, 'Live quiz saved to archive.', 'success');
        } catch (e) {
          if (source !== 'auto') setStatus(els.resultsStatus, 'Could not save live quiz to archive.', 'error');
        }
      }

      function loadArchivedLiveQuiz(item) {
        if (!item || !Array.isArray(item.questions) || !item.questions.length) return;
        state.kids = Array.isArray(item.kids) ? item.kids.slice() : [];
        state.questions = item.questions.slice();
        state.answers = Array.isArray(item.answers) ? item.answers : [];
        state.revealed = Array.isArray(item.revealed) ? item.revealed : [];
        state.currentIndex = 0;
        state.meta = item.meta || { date: item.savedAt || new Date().toISOString(), topic: 'General' };
        if (!state.answers.length || state.answers.length !== state.questions.length) initAnswers();
        if (!state.revealed.length || state.revealed.length !== state.questions.length) state.revealed = state.questions.map(function () { return false; });
        els.qTotal.textContent = String(state.questions.length);
        renderResults();
        showPanel('results');
        setStatus(els.resultsStatus, 'Loaded archived live quiz.', 'success');
      }

      function loadSample() {
        if (rosterState.names.length === 0) {
          ['Aarav', 'Diya', 'Kabir', 'Meera'].forEach(function (n) {
            var key = rosterKeyOf(n);
            rosterState.names.push(n);
            rosterState.selected[key] = true;
          });
          rosterState.names = rosterState.names.filter(Boolean).map(normalizeKidName);
          rosterState.names.sort(function (a, b) { return a.localeCompare(b); });
          saveRoster(rosterState.names);
          renderRoster();
        } else {
          // select first few for convenience
          rosterState.names.slice(0, 4).forEach(function (n) { rosterState.selected[rosterKeyOf(n)] = true; });
          renderRoster();
        }
        els.subject.value = 'General Knowledge';
        fillTopicDropdown();
        var wantGk = 'Current Affairs (India & World)';
        var hitGk = els.topicSuggest ? Array.from(els.topicSuggest.options).find(function (o) { return o.value === wantGk; }) : null;
        if (hitGk && els.topicSuggest) els.topicSuggest.value = wantGk;
        else if (els.topicSuggest && els.topicSuggest.options[0] && els.topicSuggest.options[0].value !== TOPIC_OTHERS) {
          els.topicSuggest.value = els.topicSuggest.options[0].value;
        }
        onTopicSuggestChange();
        if (els.subTopics) els.subTopics.value = 'Mixed practice, quick recall';
        if (els.additionalDetails) els.additionalDetails.value = 'Keep language simple; prefer short questions.';
        els.difficulty.value = 'Easy';
        els.count.value = '10';
        setStatus(els.setupStatus, 'Sample settings loaded. Click “Start Live Quiz”.', 'success');
      }

      // Receive messages from Tutor Hub parent (defaults + theme + AI config)
      window.addEventListener('message', function (ev) {
        try {
          var d = ev && ev.data ? ev.data : null;
          if (!d || !d.type) return;

          if (d.type === 'LQ_DEFAULTS') {
            var defs = d.defaults || {};
            if (defs.grade != null && document.getElementById('grade')) document.getElementById('grade').value = String(defs.grade);
            if (defs.subject && document.getElementById('subject')) document.getElementById('subject').value = defs.subject;
            if (defs.board && document.getElementById('board')) document.getElementById('board').value = defs.board;
            if (defs.difficulty && document.getElementById('difficulty')) document.getElementById('difficulty').value = defs.difficulty;
            if (defs.count != null && document.getElementById('count')) document.getElementById('count').value = String(defs.count);
            if (defs.autosaveGenerated != null) liveQuizSettings.autosaveGenerated = Boolean(defs.autosaveGenerated);
            try { fillTopicDropdown(); applyI18n(); } catch (e2) {}
            return;
          }

          if (d.type === 'LQ_AI') {
            applyAiFromParent(d.ai || {});
            return;
          }

          if (d.type === 'LQ_LOAD_ARCHIVE') {
            loadArchivedLiveQuiz(d.item || {});
            return;
          }

          if (d.type === 'LQ_THEME') {
            var t = (d.theme === 'light' || d.theme === 'dark') ? d.theme : 'dark';
            document.documentElement.setAttribute('data-theme', t);
            return;
          }

          if (d.type === 'LQ_LANG') {
            UI_LANG = d.lang === 'hi' ? 'hi' : 'en';
            applyI18n();
          }
        } catch (e) {}
      });

      // Best-effort: hydrate Gemini key from local session if parent hasn't posted yet.
      try {
        var saved = sessionStorage.getItem(STORAGE_KEY);
        if (saved && !ai.googleApiKey) ai.googleApiKey = String(saved);
      } catch (e) {}

      els.btnLoadSample.addEventListener('click', loadSample);
      els.btnReset.addEventListener('click', function () {
        if (els.customTopic) els.customTopic.value = '';
        if (els.subTopics) els.subTopics.value = '';
        if (els.additionalDetails) els.additionalDetails.value = '';
        try { fillTopicDropdown(); } catch (e) {}
        onTopicSuggestChange();
        // keep roster, just clear selection
        rosterState.selected = Object.create(null);
        renderRoster();
        setStatus(els.setupStatus, '', '');
      });

      els.btnStart.addEventListener('click', async function () {
        setStatus(els.setupStatus, '', '');
        var kids = getSelectedKids();
        if (kids.length === 0) { setStatus(els.setupStatus, 'Select at least 1 kid from the kids list.', 'error'); return; }
        if (kids.length > 40) { setStatus(els.setupStatus, 'Too many kids selected for one screen. Please keep it under 40.', 'error'); return; }
        if (!getFinalTopic()) {
          setStatus(els.setupStatus, 'Please choose a topic (or pick Others and enter a custom topic).', 'error');
          return;
        }

        els.btnStart.disabled = true;
        els.btnStart.textContent = 'Starting…';
        setStatus(els.setupStatus, 'Preparing quiz…', 'loading');

        try {
          setStatus(els.setupStatus, 'Generating questions with AI…', 'loading');
          var questions = await generateQuestionsWithProvider();

          state.kids = kids;
          state.questions = questions;
          state.currentIndex = 0;
          state.meta = {
            date: new Date().toISOString(),
            grade: els.grade.value,
            subject: els.subject.value,
            topic: getFinalTopic(),
            subtopics: els.subTopics ? (els.subTopics.value || '').trim() : '',
            additionalDetails: els.additionalDetails ? (els.additionalDetails.value || '').trim() : '',
            difficulty: els.difficulty.value
          };
          initAnswers();

          els.qTotal.textContent = String(state.questions.length);
          showPanel('quiz');
          renderQuestion();
          if (liveQuizSettings.autosaveGenerated) saveLiveQuizToArchive('auto');
          setStatus(els.setupStatus, '', '');
        } catch (e) {
          setStatus(els.setupStatus, e.message || 'Failed to start quiz.', 'error');
        } finally {
          els.btnStart.disabled = false;
          els.btnStart.textContent = 'Start Live Quiz';
        }
      });

      function goPrev() {
        if (state.currentIndex > 0) {
          state.currentIndex -= 1;
          renderQuestion();
        }
      }
      function goNext() {
        if (state.currentIndex < state.questions.length - 1) {
          state.currentIndex += 1;
          renderQuestion();
          return;
        }
        // last question → finish
        finishQuiz();
      }
      function finishQuiz() {
        renderResults();
        showPanel('results');
        setStatus(els.resultsStatus, 'Quiz finished.', 'success');
      }

      function toggleReveal() {
        var qi = state.currentIndex;
        state.revealed[qi] = !state.revealed[qi];
        renderQuestion();
      }

      els.btnPrev.addEventListener('click', goPrev);
      els.btnNext.addEventListener('click', goNext);
      els.btnShowAnswer.addEventListener('click', toggleReveal);
      els.btnFinish.addEventListener('click', finishQuiz);
      els.btnExit.addEventListener('click', function () {
        if (!confirm('Exit quiz? Your current answers will be lost.')) return;
        state.kids = [];
        state.questions = [];
        state.answers = [];
        state.revealed = [];
        state.currentIndex = 0;
        state.meta = null;
        showPanel('setup');
        setStatus(els.setupStatus, 'Exited. You can start a new quiz.', 'warn');
      });

      els.btnClearQ.addEventListener('click', function () {
        var qi = state.currentIndex;
        for (var ki = 0; ki < state.kids.length; ki++) state.answers[qi][ki] = null;
        renderKidsAnswerTable();
        setStatus(els.quizStatus, 'Cleared answers for this question.', 'success');
        setTimeout(function () { setStatus(els.quizStatus, '', ''); }, 1200);
      });

      els.btnBackQuiz.addEventListener('click', function () {
        showPanel('quiz');
        renderQuestion();
      });
      els.btnNewQuiz.addEventListener('click', function () {
        state.kids = [];
        state.questions = [];
        state.answers = [];
        state.currentIndex = 0;
        state.meta = null;
        showPanel('setup');
        setStatus(els.setupStatus, 'Ready for a new quiz.', 'success');
      });
      els.btnExportCsv.addEventListener('click', exportCsv);
      els.btnExportPng.addEventListener('click', function () { exportResultsImage('png'); });
      els.btnExportJpg.addEventListener('click', function () { exportResultsImage('jpg'); });
      if (els.btnDownloadQuizPdf) els.btnDownloadQuizPdf.addEventListener('click', exportQuizPdf);
      if (els.btnDownloadQuizPng) els.btnDownloadQuizPng.addEventListener('click', function () { exportQuizPng(); });
      if (els.btnDownloadKeyPdf) els.btnDownloadKeyPdf.addEventListener('click', exportAnswerKeyPdf);
      if (els.btnDownloadKeyPng) els.btnDownloadKeyPng.addEventListener('click', exportAnswerKeyPng);
      if (els.btnSaveArchive) els.btnSaveArchive.addEventListener('click', function () { saveLiveQuizToArchive('manual'); });

      if (els.topicSuggest) els.topicSuggest.addEventListener('change', onTopicSuggestChange);
      if (els.customTopic) {
        els.customTopic.addEventListener('input', function () {
          if (els.topicSuggest && els.topicSuggest.value === TOPIC_OTHERS && els.topic) els.topic.value = TOPIC_OTHERS;
        });
      }
      if (els.grade) els.grade.addEventListener('change', function () { fillTopicDropdown(); applyI18n(); });
      if (els.subject) els.subject.addEventListener('change', function () { fillTopicDropdown(); applyI18n(); });
      if (els.board) els.board.addEventListener('change', function () { fillTopicDropdown(); applyI18n(); });
      try { fillTopicDropdown(); } catch (e) {}
      applyI18n();

      // Roster init + events
      rosterState.names = loadRoster();
      rosterState.names = rosterState.names.filter(Boolean).map(normalizeKidName);
      rosterState.names.sort(function (a, b) { return a.localeCompare(b); });
      renderRoster();

      if (els.btnAddKid) els.btnAddKid.addEventListener('click', addKidFromInput);
      if (els.kidName) {
        els.kidName.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') { e.preventDefault(); addKidFromInput(); }
        });
      }
      if (els.btnSelectAllKids) els.btnSelectAllKids.addEventListener('click', function () {
        rosterState.names.forEach(function (n) { rosterState.selected[rosterKeyOf(n)] = true; });
        renderRoster();
      });
      if (els.btnClearKids) els.btnClearKids.addEventListener('click', function () {
        rosterState.selected = Object.create(null);
        renderRoster();
      });
    })();
  </script>
</body>
</html>
